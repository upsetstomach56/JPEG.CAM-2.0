apply plugin: 'com.android.application'

repositories {
    google()
    mavenCentral()
    jcenter()
    maven { url 'https://jitpack.io' }
}

android {
    compileSdkVersion 25
    buildToolsVersion "26.0.2"

    defaultConfig {
        applicationId "com.jpgcookbook.sony"
        minSdkVersion 10
        targetSdkVersion 25
        versionCode 1
        versionName "1.0-NDK"

        externalNativeBuild {
            cmake {
                cppFlags "-O3 -mfpu=neon"
                abiFilters "armeabi-v7a"
            }
        }
    }

    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
        }
    }

    applicationVariants.all { variant ->
        variant.outputs.all { output ->
            outputFileName = "Sony-JPGCookbook-NDK-v${variant.versionName}.apk"
        }
    }
}

dependencies {
    implementation 'com.github.ma1co.OpenMemories-Framework:framework:-SNAPSHOT'
    compileOnly 'com.github.ma1co.OpenMemories-Framework:stubs:-SNAPSHOT'
}