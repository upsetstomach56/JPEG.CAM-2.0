name: Build Sony Camera APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0
    
    - name: Set up Java 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Purge Modern SDKs
      run: |
        sudo rm -rf $ANDROID_HOME/platforms/android-3*
        sudo rm -rf $ANDROID_HOME/build-tools/3*

    - name: Setup Gradle 4.10.3
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 4.10.3
        cache-disabled: true

    - name: Build APK
      run: |
        gradle wrapper --gradle-version 4.10.3
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace

    - name: Upload Result
      uses: actions/upload-artifact@v4
      with:
        name: Sony-JPGCookbook-APK
        path: app/build/outputs/apk/debug/*.apk