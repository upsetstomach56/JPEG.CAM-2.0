name: Build Sony Camera APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Java 17 (For Installer)
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Vintage NDK
      run: |
        echo "y" | ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --install "ndk;21.4.7075529" --sdk_root=${ANDROID_SDK_ROOT}

    - name: Set up Java 8 (For Camera App)
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Create local.properties (Force Path)
      run: |
        echo "ndk.dir=${ANDROID_SDK_ROOT}/ndk/21.4.7075529" > local.properties
        echo "sdk.dir=${ANDROID_SDK_ROOT}" >> local.properties

    - name: Setup Gradle 4.10.3
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 4.10.3

    - name: Build APK
      run: |
        gradle wrapper --gradle-version 4.10.3
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace

    - name: Upload Result
      uses: actions/upload-artifact@v4
      with:
        name: Sony-JPGCookbook-NDK
        path: app/build/outputs/apk/debug/*.apk